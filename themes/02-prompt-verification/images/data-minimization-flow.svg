<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Минимизация данных в учебном AI-сценарии</title>
  <desc id="desc">Путь данных от исходного набора к обезличенному промпту и утвержденному результату с журналом версии.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .label { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .body { font: 16px Arial, sans-serif; fill: #1f2937; }
      .card { stroke: #334155; stroke-width: 2; rx: 18; ry: 18; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" class="title">Минимизация данных в учебном AI-сценарии</text>

  <rect x="40" y="130" width="190" height="110" class="card" fill="#2563eb"/>
  <text x="135" y="178" text-anchor="middle" class="label">Исходные</text>
  <text x="135" y="206" text-anchor="middle" class="label">данные</text>

  <rect x="270" y="130" width="210" height="110" class="card" fill="#0891b2"/>
  <text x="375" y="178" text-anchor="middle" class="label">Отбор нужных</text>
  <text x="375" y="206" text-anchor="middle" class="label">полей</text>

  <rect x="520" y="130" width="210" height="110" class="card" fill="#16a34a"/>
  <text x="625" y="178" text-anchor="middle" class="label">Обезличивание</text>
  <text x="625" y="206" text-anchor="middle" class="label">и маскирование</text>

  <rect x="770" y="130" width="170" height="110" class="card" fill="#7c3aed"/>
  <text x="855" y="178" text-anchor="middle" class="label">Промпт</text>
  <text x="855" y="206" text-anchor="middle" class="label">без лишних ПД</text>

  <rect x="980" y="130" width="180" height="110" class="card" fill="#111827"/>
  <text x="1070" y="178" text-anchor="middle" class="label">Approved</text>
  <text x="1070" y="206" text-anchor="middle" class="label">результат</text>

  <line x1="230" y1="185" x2="270" y2="185" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="480" y1="185" x2="520" y2="185" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="730" y1="185" x2="770" y2="185" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="940" y1="185" x2="980" y2="185" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="330" y="285" width="220" height="54" class="card" fill="#fee2e2"/>
  <text x="440" y="319" text-anchor="middle" class="body">Удаляем лишние идентификаторы</text>

  <rect x="650" y="285" width="250" height="54" class="card" fill="#dcfce7"/>
  <text x="775" y="319" text-anchor="middle" class="body">Фиксируем версию и решение проверки</text>
</svg>

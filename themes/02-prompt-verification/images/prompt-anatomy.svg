<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Анатомия сильного промпта</title>
  <desc id="desc">Шесть обязательных блоков сильного промпта: роль, контекст, задача, ограничения, формат и критерии качества.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2f4f4f"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .label { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .body { font: 16px Arial, sans-serif; fill: #1f2937; }
      .card { stroke: #2f4f4f; stroke-width: 2; rx: 18; ry: 18; }
    </style>
  </defs>

  <rect width="1280" height="420" fill="#f8fafc"/>
  <text x="640" y="48" text-anchor="middle" class="title">Анатомия сильного промпта</text>

  <rect x="40" y="120" width="175" height="110" class="card" fill="#2563eb"/>
  <text x="128" y="170" text-anchor="middle" class="label">1. Роль</text>
  <text x="128" y="198" text-anchor="middle" class="label">Кто говорит</text>

  <rect x="245" y="120" width="180" height="110" class="card" fill="#0891b2"/>
  <text x="335" y="170" text-anchor="middle" class="label">2. Контекст</text>
  <text x="335" y="198" text-anchor="middle" class="label">Для кого и зачем</text>

  <rect x="455" y="120" width="180" height="110" class="card" fill="#16a34a"/>
  <text x="545" y="170" text-anchor="middle" class="label">3. Задача</text>
  <text x="545" y="198" text-anchor="middle" class="label">Что сделать</text>

  <rect x="665" y="120" width="190" height="110" class="card" fill="#ea580c"/>
  <text x="760" y="170" text-anchor="middle" class="label">4. Ограничения</text>
  <text x="760" y="198" text-anchor="middle" class="label">Что нельзя</text>

  <rect x="885" y="120" width="160" height="110" class="card" fill="#7c3aed"/>
  <text x="965" y="170" text-anchor="middle" class="label">5. Формат</text>
  <text x="965" y="198" text-anchor="middle" class="label">Как вернуть</text>

  <rect x="1075" y="120" width="165" height="110" class="card" fill="#dc2626"/>
  <text x="1157" y="170" text-anchor="middle" class="label">6. Качество</text>
  <text x="1157" y="198" text-anchor="middle" class="label">Как принять</text>

  <line x1="215" y1="175" x2="245" y2="175" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="425" y1="175" x2="455" y2="175" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="635" y1="175" x2="665" y2="175" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="855" y1="175" x2="885" y2="175" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1045" y1="175" x2="1075" y2="175" stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="640" y="300" text-anchor="middle" class="body">Сильный промпт = компактная спецификация результата, а не просто «вопрос к нейросети».</text>
  <text x="640" y="330" text-anchor="middle" class="body">Если хотя бы один блок пропущен, качество ответа становится труднее контролировать и проверять.</text>
</svg>
